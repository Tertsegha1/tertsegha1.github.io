<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV — Dr. Tertsegha Joseph Anande</title>
  <link rel="icon" href="assets/img/profile.jpg" type="image/jpeg">
  <style>
    /* ── Design tokens ── */
    :root {
      --navy:   #0f2044;
      --navy2:  #1a3260;
      --gold:   #e8a020;
      --text:   #2c3e50;
      --light:  #5a6a7e;
      --rule:   #e1e8f0;
      --bg:     #f5f7fa;
      --white:  #ffffff;
    }

    /* ── Screen chrome ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

    /* ── Action bar (hidden on print) ── */
    .action-bar {
      position: sticky; top: 0; z-index: 100;
      background: var(--navy); padding: 0.75rem 2rem;
      display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }
    .action-bar a.back {
      color: rgba(255,255,255,0.65); font-size: 0.82rem; text-decoration: none; margin-right: auto;
    }
    .action-bar a.back:hover { color: var(--gold); }
    .ab-btn {
      padding: 7px 18px; border-radius: 6px; font-size: 0.82rem; font-weight: 700;
      cursor: pointer; border: none; font-family: inherit; transition: all 0.2s;
    }
    .ab-btn-pdf  { background: var(--gold); color: var(--navy); }
    .ab-btn-pdf:hover  { background: #f0b840; }
    .ab-btn-docx { background: rgba(255,255,255,0.12); color: #fff; border: 1px solid rgba(255,255,255,0.25); }
    .ab-btn-docx:hover { background: rgba(255,255,255,0.2); }
    .ab-hint { font-size: 0.75rem; color: rgba(255,255,255,0.45); }

    /* ── CV page shell ── */
    .cv-page {
      width: 210mm;
      min-height: 297mm;
      margin: 2rem auto;
      background: var(--white);
      padding: 18mm 18mm 20mm;
      box-shadow: 0 4px 32px rgba(0,0,0,0.12);
    }

    /* ── Header ── */
    .cv-name { font-size: 28pt; font-weight: 800; color: var(--navy); line-height: 1.1; }
    .cv-creds { font-size: 10pt; color: var(--gold); font-weight: 700; margin-top: 4px; letter-spacing: 0.5px; }
    .cv-contact {
      display: flex; flex-wrap: wrap; gap: 0 1.5rem;
      font-size: 8.5pt; color: var(--light); margin-top: 6px;
    }
    .cv-contact a { color: var(--navy2); text-decoration: none; }
    .cv-contact a:hover { text-decoration: underline; }
    .cv-rule-thick { height: 3px; background: var(--navy); margin: 10px 0 14px; }

    /* ── Section headings ── */
    .cv-sh {
      font-size: 8.5pt; font-weight: 700; color: var(--navy);
      letter-spacing: 1px; text-transform: uppercase;
      border-bottom: 2px solid var(--gold);
      padding-bottom: 2px; margin: 14px 0 7px;
    }

    /* ── Body text ── */
    .cv-p  { font-size: 9pt; color: var(--text); line-height: 1.6; margin-bottom: 5px; }
    .cv-sm { font-size: 8.5pt; color: var(--light); line-height: 1.5; margin-bottom: 2px; }

    /* ── Job block ── */
    .cv-job { margin-bottom: 10px; }
    .cv-job-head { display: flex; justify-content: space-between; align-items: baseline; gap: 1rem; }
    .cv-job-title { font-size: 9.5pt; font-weight: 700; color: var(--navy); }
    .cv-job-date  { font-size: 8.5pt; color: var(--light); font-style: italic; white-space: nowrap; }
    .cv-job-org   { font-size: 8.5pt; color: var(--light); font-style: italic; margin-bottom: 3px; }
    .cv-ul { margin: 3px 0 0 14px; }
    .cv-ul li {
      font-size: 8.5pt; color: var(--text); line-height: 1.55;
      margin-bottom: 2px; list-style: none; position: relative; padding-left: 10px;
    }
    .cv-ul li::before { content: '–'; position: absolute; left: 0; color: var(--gold); font-weight: 700; }
    .cv-ul li strong { color: var(--navy); }

    /* ── Skills chips ── */
    .cv-skill-row { margin-bottom: 4px; font-size: 8.5pt; line-height: 1.6; }
    .cv-skill-row strong { color: var(--navy); }

    /* ── Two-column layout ── */
    .cv-two { display: grid; grid-template-columns: 1fr 1fr; gap: 0 2rem; margin-top: 6px; }

    /* ── Publication entry ── */
    .cv-pub { font-size: 8.5pt; line-height: 1.55; margin-bottom: 4px; }
    .cv-pub strong { color: var(--navy); }

    /* ── Footer ── */
    .cv-footer {
      margin-top: 14px; padding-top: 6px;
      border-top: 1px solid var(--rule);
      font-size: 7.5pt; color: var(--light); text-align: center;
    }

    /* ── PRINT STYLES ── */
    @media print {
      body { background: white; }
      .action-bar { display: none !important; }
      .cv-page { width: 100%; margin: 0; padding: 14mm 16mm 16mm; box-shadow: none; }
      a { color: inherit !important; text-decoration: none !important; }
      .cv-contact a { color: var(--navy2) !important; }
    }
    @page { size: A4; margin: 0; }
  </style>
</head>

/* ── Tiny DOM helpers ── */
function strip(s){ return (s||'').replace(/<[^>]+>/g,'').replace(/&amp;/g,'&').replace(/&gt;/g,'>').replace(/&lt;/g,'<').replace(/&nbsp;/g,' ').trim(); }
function el(tag,cls,html){ const e=document.createElement(tag); if(cls)e.className=cls; if(html!==undefined)e.innerHTML=html; return e; }

/* ═══════════════════════════════════════════════

async function downloadDocx(){
  const btn = document.getElementById('docxBtn');
  btn.textContent = 'Generating…'; btn.disabled = true;
  try {
    const {
      Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
      AlignmentType, LevelFormat, BorderStyle, WidthType,
      TabStopType, TabStopPosition, PageNumber, Header, ExternalHyperlink,
    } = docx;

    const NAVY='0F2044', NAVY2='1A3260', GOLD='E8A020', DGRAY='2C3E50', MGRAY='5A6A7E';
    const CW = 9890;
    const sp = (b,a)=>({spacing:{before:b,after:a}});
    const run = (text,opts={})=>new TextRun({text,font:'Arial',...opts});
    const bold = (text,opts={})=>run(text,{bold:true,...opts});

    function sh(text){
      return new Paragraph({...sp(220,80),
        border:{bottom:{style:BorderStyle.SINGLE,size:12,color:GOLD,space:4}},
        children:[new TextRun({text:text.toUpperCase(),font:'Arial',size:21,bold:true,color:NAVY,characterSpacing:40})]});
    }
    function jobBlock(date,title,org,bullets){
      return [
        new Paragraph({...sp(140,0),tabStops:[{type:TabStopType.RIGHT,position:CW}],
          children:[bold(title,{size:21,color:NAVY}),run('\t',{size:21}),run(date,{size:19,color:MGRAY,italics:true})]}),
        new Paragraph({...sp(0,50),children:[run(org,{size:19,color:MGRAY,italics:true})]}),
        ...bullets.map(b=>new Paragraph({numbering:{reference:'bul',level:0},...sp(0,30),
          children:[run(strip(b),{size:19,color:DGRAY})]}))
      ];
    }
    function strip(s){ return (s||'').replace(/<[^>]+>/g,'').replace(/&amp;/g,'&').replace(/&gt;/g,'>'); }
    function chipRow(label,chips){
      return new Paragraph({...sp(30,30),children:[bold(label+': ',{size:19,color:NAVY}),run(chips.join('  ·  '),{size:19,color:DGRAY})]});
    }

    const p = DATA.personal;
    const doc2 = new Document({
      numbering:{config:[{reference:'bul',levels:[{level:0,format:LevelFormat.BULLET,text:'–',alignment:AlignmentType.LEFT,
        style:{paragraph:{indent:{left:320,hanging:200}},run:{font:'Arial',color:GOLD}}}]}]},
      styles:{default:{document:{run:{font:'Arial',size:21,color:DGRAY}}}},
      sections:[{
        properties:{page:{size:{width:11906,height:16838},margin:{top:720,right:1008,bottom:720,left:1008}}},
        headers:{default:new Header({children:[new Paragraph({...sp(0,0),
          border:{bottom:{style:BorderStyle.SINGLE,size:6,color:GOLD,space:2}},
          tabStops:[{type:TabStopType.RIGHT,position:CW}],
          children:[run('Dr. Tertsegha Joseph Anande',{size:17,color:MGRAY}),run('\t',{size:17}),
            new TextRun({children:['Page ',PageNumber.CURRENT,' of ',PageNumber.TOTAL_PAGES],font:'Arial',size:17,color:MGRAY})]})]})} ,
        children:[
          // Name block
          new Paragraph({...sp(0,0),children:[new TextRun({text:p.name,font:'Arial',size:52,bold:true,color:NAVY})]}),
          new Paragraph({...sp(50,0),children:[run('PhD  ·  FHEA  ·  MBCS  ·  IET  ·  IEEE',{size:21,color:GOLD,bold:true})]}),
          new Paragraph({...sp(50,80),tabStops:[{type:TabStopType.LEFT,position:2000},{type:TabStopType.LEFT,position:5000},{type:TabStopType.LEFT,position:7600}],
            children:[run('Birmingham, UK',{size:19,color:MGRAY}),run('\t'),run(p.email,{size:19,color:MGRAY}),run('\t'),
              new ExternalHyperlink({link:'https://www.drtertseghaanande.com',children:[new TextRun({text:'drtertseghaanande.com',font:'Arial',size:19,color:NAVY2,underline:{}})]}),
              run('\t'),new ExternalHyperlink({link:p.linkedin,children:[new TextRun({text:'LinkedIn Profile',font:'Arial',size:19,color:NAVY2,underline:{}})]})]}),
          new Paragraph({...sp(0,160),border:{bottom:{style:BorderStyle.SINGLE,size:18,color:NAVY,space:1}},children:[]}),

          // Profile
          sh('Professional Profile'),
          new Paragraph({...sp(60,0),children:[run('PhD-trained computing lecturer and database practitioner with over 10 years of combined experience in enterprise database engineering, software development, applied machine learning, and higher education. Brings hands-on PostgreSQL expertise developed through academic teaching, module leadership, and applied research — including practical delivery of PostgreSQL laboratory sessions at the University of Warwick and current module leadership of Advanced Database Systems and Database Systems at QAHE / Ulster University.',{size:19,color:DGRAY})]}),
          new Paragraph({...sp(60,160),children:[run('Demonstrates comprehensive command of PostgreSQL administration, advanced SQL engineering, performance tuning, indexing strategy, MVCC and concurrency, data governance and UK GDPR compliance, ETL/ELT pipeline design, and high availability with replication. Fellow of the Higher Education Academy (FHEA), Member of the BCS and IET, with a strong record of structured, outcome-driven technical training delivery.',{size:19,color:DGRAY})]}),

          // DB Expertise
          sh('Database Engineering Expertise'),
          chipRow('Core Platform',         ['PostgreSQL 16','SQL Engineering','PL/pgSQL','JSONB','psql','pgAdmin 4']),
          chipRow('Performance Tuning',    ['EXPLAIN / EXPLAIN ANALYSE','pg_stat_statements','postgresql.conf Tuning','pgBouncer','pgBadger']),
          chipRow('Indexing',              ['B-tree','GIN','GiST','BRIN','Partial Indexes','Covering Indexes','Expression Indexes']),
          chipRow('Data Architecture',     ['Partitioning & Sharding','Replication & HA','Patroni','PITR','Barman / pgBackRest']),

          new Paragraph({...sp(160,0),children:[]}),

          // Experience
          sh('Professional Experience'),
          ...jobBlock('Mar 2025 – Present','Deputy Programme Leader & Module Leader','QAHE Limited / Ulster University — Birmingham, UK',
            ['Module Leader for Advanced Database Systems (Y2 UG) and Database Systems (Y2 UG) — covering relational design, SQL, normalisation, transactions, and PostgreSQL in enterprise contexts',
             'Oversees curriculum QA across MSc Computing programmes; leads UX Strategies and Object-Oriented Design & Development',
