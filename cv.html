<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV — Dr. Tertsegha Joseph Anande</title>
  <link rel="icon" href="assets/img/profile.jpg" type="image/jpeg">
  <style>
    :root {
      --navy:#0f2044; --navy2:#1a3260; --gold:#e8a020; --gold2:#f0b840;
      --text:#2c3e50; --muted:#5a6a7e; --rule:#e1e8f0; --bg:#f0f3f8; --white:#fff;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:Arial,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);}

    /* ── Action bar ── */
    .abar{
      position:sticky;top:0;z-index:200;background:var(--navy);
      padding:.6rem 1.5rem;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;
      box-shadow:0 2px 12px rgba(0,0,0,.3);
    }
    .abar a.back{color:rgba(255,255,255,.6);font-size:.8rem;text-decoration:none;margin-right:auto;}
    .abar a.back:hover{color:var(--gold);}
    .abtn{padding:6px 16px;border-radius:6px;font-size:.8rem;font-weight:700;
      cursor:pointer;border:none;font-family:inherit;transition:all .2s;}
    .abtn-pdf{background:var(--gold);color:var(--navy);}
    .abtn-pdf:hover{background:var(--gold2);}
    .abtn-doc{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);}
    .abtn-doc:hover{background:rgba(255,255,255,.2);}
    .abtn:disabled{opacity:.5;cursor:not-allowed;}

    /* ── Profile selector ── */
    .prof-bar{background:var(--navy2);padding:.75rem 1.5rem;}
    .prof-hint{font-size:.72rem;color:rgba(255,255,255,.5);margin-bottom:.5rem;}
    .prof-tabs{display:flex;gap:.5rem;flex-wrap:wrap;}
    .ptab{
      display:flex;align-items:center;gap:.4rem;
      padding:7px 16px;border-radius:20px;font-size:.78rem;font-weight:600;
      cursor:pointer;border:1.5px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);
      color:rgba(255,255,255,.7);transition:all .2s;white-space:nowrap;
    }
    .ptab:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.4);color:#fff;}
    .ptab.active{background:var(--gold);color:var(--navy);border-color:var(--gold);}
    .ptab-icon{font-size:1rem;}

    /* ── CV page ── */
    .cv-wrap{max-width:820px;margin:2rem auto;padding:0 1rem 3rem;}
    .cv-page{
      background:var(--white);padding:18mm 18mm 20mm;
      box-shadow:0 4px 32px rgba(0,0,0,.12);
    }

    /* ── Header ── */
    .cv-name{font-size:26pt;font-weight:800;color:var(--navy);line-height:1.1;}
    .cv-creds{font-size:9.5pt;color:var(--gold);font-weight:700;margin-top:3px;letter-spacing:.5px;}
    .cv-contact{display:flex;flex-wrap:wrap;gap:0 1.4rem;font-size:8pt;color:var(--muted);margin-top:5px;}
    .cv-contact a{color:var(--navy2);text-decoration:none;}
    .cv-contact a:hover{text-decoration:underline;}
    .cv-rule{height:3px;background:var(--navy);margin:9px 0 12px;}

    /* ── Section headings ── */
    .cv-sh{
      font-size:8pt;font-weight:700;color:var(--navy);
      letter-spacing:1.2px;text-transform:uppercase;
      border-bottom:2px solid var(--gold);padding-bottom:2px;margin:13px 0 6px;
    }

    /* ── Profile badge ── */
    .cv-profile-badge{
      display:inline-block;font-size:7.5pt;font-weight:700;
      padding:2px 10px;border-radius:10px;margin-bottom:6px;
      background:#f0f3f8;color:var(--navy2);border:1px solid var(--rule);
    }

    /* ── Body text ── */
    .cv-p{font-size:8.5pt;color:var(--text);line-height:1.6;margin-bottom:4px;}
    .cv-sm{font-size:8pt;color:var(--muted);line-height:1.5;margin-bottom:2px;}

    /* ── Job block ── */
    .cv-job{margin-bottom:9px;}
    .cv-jh{display:flex;justify-content:space-between;align-items:baseline;gap:.8rem;}
    .cv-jt{font-size:9pt;font-weight:700;color:var(--navy);}
    .cv-jd{font-size:7.5pt;color:var(--muted);font-style:italic;white-space:nowrap;}
    .cv-jo{font-size:8pt;color:var(--muted);font-style:italic;margin-bottom:2px;}
    .cv-ul{margin:2px 0 0 12px;}
    .cv-ul li{
      font-size:8pt;color:var(--text);line-height:1.55;
      margin-bottom:2px;list-style:none;position:relative;padding-left:10px;
    }
    .cv-ul li::before{content:'–';position:absolute;left:0;color:var(--gold);font-weight:700;}
    .cv-ul li strong{color:var(--navy);}

    /* ── Skills rows ── */
    .cv-sr{font-size:8pt;line-height:1.6;margin-bottom:3px;}
    .cv-sr strong{color:var(--navy);}

    /* ── Two-column ── */
    .cv-2col{display:grid;grid-template-columns:1fr 1fr;gap:0 2rem;margin-top:5px;}

    /* ── Project card ── */
    .cv-proj{margin-bottom:7px;padding-left:10px;border-left:2px solid var(--gold);}
    .cv-proj-title{font-size:8.5pt;font-weight:700;color:var(--navy);margin-bottom:1px;}
    .cv-proj-tech{font-size:7.5pt;color:var(--gold);margin-bottom:1px;}
    .cv-proj-desc{font-size:7.5pt;color:var(--muted);line-height:1.5;}

    /* ── Publications ── */
    .cv-pub{font-size:8pt;line-height:1.55;margin-bottom:4px;}
    .cv-pub strong{color:var(--navy);}

    /* ── Research interests grid ── */
    .cv-ri{display:grid;grid-template-columns:repeat(3,1fr);gap:3px 1rem;margin-top:4px;}
    .cv-ri-item{font-size:8pt;color:var(--text);padding:2px 0;}
    .cv-ri-item::before{content:'▸ ';color:var(--gold);}

    /* ── Footer ── */
    .cv-footer{
      margin-top:12px;padding-top:5px;
      border-top:1px solid var(--rule);
      font-size:7pt;color:var(--muted);text-align:center;
    }

    /* ── Transition ── */
    #cvRoot{animation:none;}
    @keyframes cvFadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
    #cvRoot.rendered{animation:cvFadeIn .2s ease both;}

    /* ── PRINT ── */
    @media print{
      body{background:#fff;}
      .abar,.prof-bar{display:none!important;}
      .cv-wrap{max-width:100%;margin:0;padding:0;}
      .cv-page{padding:12mm 15mm 15mm;box-shadow:none;}
      a{color:inherit!important;text-decoration:none!important;}
      .cv-contact a{color:var(--navy2)!important;}
      .cv-profile-badge{display:none!important;}
    }
    @page{size:A4;margin:0;}
  </style>
</head>
<body>

<!-- ── Action bar ── -->
<div class="abar">
  <a class="back" href="index.html">&#8592; Portfolio</a>
  <span style="font-size:.72rem;color:rgba(255,255,255,.4);">PDF: Chrome → Print → Save as PDF → A4, no margins</span>
  <button class="abtn abtn-doc" id="docxBtn" onclick="downloadDocx()">&#8595; Download DOCX</button>

</div>

<!-- ── Profile selector ── -->
<div class="prof-bar">
  <p class="prof-hint">Select a CV profile — the document updates instantly</p>
  <div class="prof-tabs" id="profTabs"></div>
</div>

<!-- ── CV ── -->
<div class="cv-wrap">
  <div class="cv-page">
    <div id="cvRoot"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<script>
/* ═══════════════════════════════════════════════════════
   PROFILE DEFINITIONS
═══════════════════════════════════════════════════════ */
const PROFILES = {

  database: {
    id: 'database', label: 'Database Engineering', icon: '🗄️', type: 'industry',
    summary: [

      'Demonstrates comprehensive command of PostgreSQL administration, advanced SQL engineering, performance tuning, indexing strategy, MVCC and concurrency, data governance and UK GDPR compliance, ETL/ELT pipeline design, and high availability with replication. Fellow of the Higher Education Academy (FHEA), Member of the BCS and IET, with a strong record of structured, outcome-driven technical training delivery.',

  },

  ml: {
    id: 'ml', label: 'Machine Learning / AI', icon: '🤖', type: 'industry',
    summary: [
      'PhD-trained machine learning researcher and computing lecturer specialising in AutoML, ensemble and meta-learning, and GAN-based synthetic data generation. Over 10 years of combined experience spanning end-to-end ML pipeline engineering, applied research, and higher education — with a track record of >99% classification accuracy on imbalanced datasets and an 80%+ throughput improvement through a novel stack ensemble meta-learning architecture.',
      'Currently building production-grade AutoML frameworks (MoSELA, THA-AutoML) and leading MSc Computing programmes at QAHE / Ulster University. Author of 14+ peer-reviewed publications in machine learning, network security, and synthetic data generation. Fellow of the Higher Education Academy (FHEA), Member of the BCS, IET, and IEEE.',
    ],

    summary: [
      'PhD-trained cyber security researcher and computing lecturer with expertise in network intrusion detection, cyber-physical systems security, and ML-based anomaly detection. Brings hands-on research and teaching experience across DDoS analysis, SDN security, rootkit analysis, and EV charging infrastructure protection — combining deep technical proficiency with applied machine learning for security-critical systems.',
      'Research Fellow at the University of Warwick (2023–2024), investigating ML-based detection of cyber and cyber-physical attacks on EV charging infrastructure. OCPP v1.6, v1.6 Advanced, and v2.0+ certified. Published author across network intrusion detection, synthetic traffic generation, and cyber-physical security. Fellow of the Higher Education Academy (FHEA) and Member of the BCS and IET.',
    ],
    skillsLabel: 'Cyber Security & Technical Expertise',

  academic: {
    id: 'academic', label: 'Academic / Research', icon: '🎓', type: 'academic',
    summary: [
      'PhD-trained academic and researcher with over 10 years of experience in higher education and applied research. Deputy Programme Leader and Lecturer in Computing at QAHE / Ulster University, with primary research interests in machine learning, ensemble and meta-learning, AutoML pipeline design, GAN-based synthetic data generation, and cyber-physical systems security.',
      'Author of 14+ peer-reviewed publications in journals and international conference proceedings, including SN Computer Science, EIDWT (Springer), DeLTA (Springer), and IJMLC. Fellow of the Higher Education Academy (FHEA — PR336175), Member of the BCS, IET, and IEEE. Committed to research excellence, curriculum innovation, and impactful technology transfer.',
    ],
    skillsLabel: 'Research & Technical Competencies',

  edtech: {

      'Fellow of the Higher Education Academy (FHEA) and Deputy Programme Leader at QAHE / Ulster University with over 10 years of experience in higher education leadership, curriculum design, and AI-powered educational technology. Specialises in designing structured pedagogical frameworks that deliver measurable outcomes — driving Digital Transformation student pass rates to 98%+ through the DT Studio initiative.',
      'Creator of three production EdTech tools deployed across Birmingham, London, and Manchester campuses: the Digital Transformation Studio (Firebase + Claude API), the Automated Marking & Grading System (Llama 3.3 70B / Whisper), and the Live Marking Tracker. Member of the BCS, IET, and IEEE, with a strong commitment to responsible AI in education and inclusive, data-driven pedagogy.',
    ],
    skillsLabel: 'Educational Technology & Computing Expertise',
    skillsFirst: ['AI in EdTech'],
    skillsAlso:  ['Software Engineering','Database Engineering','ML / AI','Languages'],
    projectKeys: ['Digital Transformation Studio','Automated Marking','Marking Tracker'],
    pubCount: 3,
    teachingFirst: true,
  },

let currentProfileId = 'database';

/* ═══════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════ */
function strip(s){ return (s||'').replace(/<[^>]+>/g,'').replace(/&amp;/g,'&').replace(/&gt;/g,'>').replace(/&lt;/g,'<').replace(/&nbsp;/g,' ').trim(); }
function el(tag,cls,html){ const e=document.createElement(tag); if(cls)e.className=cls; if(html!==undefined)e.innerHTML=html; return e; }

/* ── Section wrapper ── */
function makeSection(heading, contentEl){
  const wrap = el('div');
  wrap.appendChild(el('div','cv-sh', heading));
  if(contentEl) wrap.appendChild(contentEl);
  return wrap;
}

/* ── Header ── */
function makeHeader(p){
  const hdr = el('div');
  const nm = el('div','cv-name'); nm.textContent = p.name; hdr.appendChild(nm);
  hdr.appendChild(el('div','cv-creds','PhD  ·  FHEA  ·  MBCS  ·  IET  ·  IEEE'));
  hdr.appendChild(el('div','cv-contact',
    `<span>Birmingham, UK</span>
     <a href="mailto:${p.email}">${p.email}</a>
     <a href="https://www.drtertseghaanande.com" target="_blank">drtertseghaanande.com</a>
     <a href="${p.linkedin}" target="_blank">LinkedIn</a>
     <a href="${p.github}" target="_blank">github.com/Tertsegha1</a>`));
  hdr.appendChild(el('div','cv-rule'));
  return hdr;
}

/* ── Skills ── */
function makeSkillsContent(profile){
  const wrap = el('div');
  const allSkills = DATA.skills;
  // Use exact title match to avoid substring collisions
  const first = allSkills.filter(s => (profile.skillsFirst||[]).some(k => s.title === k));
  const seen = new Set(first.map(s => s.title));
  const also = (profile.skillsAlso||[])
    .map(k => allSkills.find(s => s.title === k))
    .filter(s => s && !seen.has(s.title));
  [...first, ...also].forEach(sk => {
    const row = el('div','cv-sr');
    row.innerHTML = '<strong>' + sk.title + ':</strong> ' + sk.tags.join('  ·  ');
    wrap.appendChild(row);
  });
  return wrap;
}

/* ── Experience ── */
function makeExperienceContent(profile){
  const wrap = el('div');
  let jobs = [...DATA.experience];
  if(profile.expReorder){
    jobs.sort((a,b)=>{
      const ai = profile.expReorder.findIndex(k => a.title.includes(k));
      const bi = profile.expReorder.findIndex(k => b.title.includes(k));
      return (ai===-1?99:ai) - (bi===-1?99:bi);
    });
  }
  jobs.forEach(j => {
    const w = el('div','cv-job');
    const hr = el('div','cv-jh');
    const tt = el('span','cv-jt'); tt.textContent = j.title; hr.appendChild(tt);
    const dt = el('span','cv-jd'); dt.textContent = j.date;  hr.appendChild(dt);
    w.appendChild(hr);
    const org = el('div','cv-jo'); org.textContent = j.org; w.appendChild(org);
    const ul = el('ul','cv-ul');
    j.bullets.forEach(b => { const li = el('li'); li.innerHTML = b; ul.appendChild(li); });
    w.appendChild(ul);
    wrap.appendChild(w);
  });
  return wrap;
}

/* ── Teaching ── */
function makeTeachingContent(){
  const two = el('div','cv-2col');
  const pgDiv = el('div');
  pgDiv.appendChild(el('p','cv-sm','<strong style="color:#0f2044">Postgraduate (MSc / PGD)</strong>'));
  DATA.teaching.postgraduate.forEach(m => {
    pgDiv.appendChild(el('p','cv-sm',
      m.leader ? '<strong style="color:#0f2044">' + m.label + ' ★</strong>' : m.label));
  });
  two.appendChild(pgDiv);
  const ugDiv = el('div');
  ugDiv.appendChild(el('p','cv-sm','<strong style="color:#0f2044">Undergraduate</strong>'));
  DATA.teaching.undergraduate.forEach(m => {
    const isDb = m.label.toLowerCase().includes('database');
    ugDiv.appendChild(el('p','cv-sm',
      m.leader ? '<strong style="color:#0f2044">' + m.label + ' ★</strong>'
               : (isDb ? '<strong style="color:#0f2044">' + m.label + '</strong>' : m.label)));
  });
  two.appendChild(ugDiv);
  return two;
}

/* ── Projects ── */
function makeProjectsContent(profile){
  if(!profile.projectKeys || !profile.projectKeys.length) return null;
  const wrap = el('div');
  DATA.projects
    .filter(p => profile.projectKeys.some(k => p.title.includes(k)))
    .forEach(proj => {
      const card = el('div','cv-proj');
      card.appendChild(el('div','cv-proj-title', strip(proj.title)));
      card.appendChild(el('div','cv-proj-tech', proj.tech.slice(0,5).join('  ·  ')));
      card.appendChild(el('div','cv-proj-desc', strip(proj.desc).substring(0,200) + '…'));
      wrap.appendChild(card);
    });
  return wrap;
}

/* ── Publications ── */
function makePublicationsContent(profile){
  const wrap = el('div');
  const pubs = DATA.publications;
  if(profile.allPubs){
    wrap.appendChild(el('p','cv-sm','<strong style="color:#0f2044">Journal Articles</strong>'));
    pubs.journal.forEach(p => wrap.appendChild(el('p','cv-pub',
      '<strong>' + p.authors + '</strong> ' + p.title + '. <em>' + p.year + '.</em>' + (p.venue ? ' ' + strip(p.venue) : ''))));
    wrap.appendChild(el('p','cv-sm','<strong style="color:#0f2044;margin-top:6px;display:block">Conference Papers</strong>'));
    pubs.conference.forEach(p => wrap.appendChild(el('p','cv-pub',
      '<strong>' + p.authors + '</strong> ' + p.title + '. <em>' + p.year + '.</em>')));
    wrap.appendChild(el('p','cv-sm','<strong style="color:#0f2044;margin-top:6px;display:block">Book</strong>'));
    pubs.book.forEach(p => wrap.appendChild(el('p','cv-pub',
      '<strong>' + p.authors + '</strong> <em>' + p.title + '.</em> ' + (p.venue||''))));
    wrap.appendChild(el('p','cv-sm','<strong style="color:#0f2044;margin-top:6px;display:block">In Preparation</strong>'));
    pubs.inPrep.forEach(p => wrap.appendChild(el('p','cv-pub',
      '<strong>' + p.authors + '</strong> ' + p.title + '. <em>Manuscript in preparation.</em>')));
  } else {
    const count = profile.pubCount || 4;
    pubs.journal.slice(0, count).forEach(p => wrap.appendChild(el('p','cv-pub',
      '<strong>' + p.authors + '</strong> ' + p.title + '. <em>' + p.year + '.</em>' + (p.venue ? ' ' + strip(p.venue) : ''))));
    pubs.conference.forEach(p => wrap.appendChild(el('p','cv-pub',
      '<strong>' + p.authors + '</strong> ' + p.title + '. <em>' + p.year + '.</em>')));
  }
  wrap.appendChild(el('p','cv-sm','<em>Full list: scholar.google.com/citations?user=J5pMcosAAAAJ</em>'));
  return wrap;
}

/* ── Research Interests ── */
function makeResearchInterestsContent(){
  const grid = el('div','cv-ri');
  DATA.research.forEach(r => grid.appendChild(el('div','cv-ri-item', r.title)));
  return grid;
}

/* ── Education ── */
function makeEducationContent(){
  const wrap = el('div');
  DATA.education.forEach(e => {
    const w = el('div','cv-job'); w.style.marginBottom = '5px';
    const tt = el('div','cv-jt'); tt.textContent = e.degree; w.appendChild(tt);
    const io = el('div','cv-jo'); io.textContent = e.institution; w.appendChild(io);
    wrap.appendChild(w);
  });
  return wrap;
}

/* ── Memberships ── */
function makeMembershipsContent(){
  const wrap = el('div');
  wrap.appendChild(el('div','cv-sr','<strong>Memberships:</strong> Fellow of the Higher Education Academy (FHEA, PR336175)  ·  Member of the BCS (MBCS)  ·  IET Member  ·  IEEE & ComSoc  ·  INSTICC'));
  wrap.appendChild(el('div','cv-sr','<strong>Certifications:</strong> OCPP v1.6, v1.6 Advanced & v2.0+ (EV Charging)  ·  Build Basic GANs — DeepLearning.AI / Coursera  ·  Preparing to Teach in Higher Education  ·  Project Management & Science Communication  ·  Business, Innovation & Commercialisation for Researchers (Warwick Doctoral College)'));
  return wrap;
}

/* ═══════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════ */
function renderCV(profileId){
  currentProfileId = profileId;
  const profile = PROFILES[profileId];
  const p = DATA.personal;
  const root = document.getElementById('cvRoot');

  // Render synchronously — no setTimeout fragility
  try {
    root.classList.remove('rendered');
    root.innerHTML = '';

    // Header
    root.appendChild(makeHeader(p));

    // Profile badge
    root.appendChild(el('div','cv-profile-badge', `${profile.icon}  ${profile.label} CV`));

    // Summary
    profile.summary.forEach((s,i) => {
      const pp = el('p','cv-p',s);
      if(i > 0) pp.style.marginTop = '4px';
      root.appendChild(pp);
    });

    if(profile.type === 'academic'){
      // ── Academic layout: research first, skills at the end ──
      root.appendChild(makeSection('Research Interests', makeResearchInterestsContent()));
      root.appendChild(makeSection('Education', makeEducationContent()));
      root.appendChild(makeSection('Academic Experience', makeExperienceContent(profile)));
      root.appendChild(makeSection('Teaching Portfolio  (★ = Module Leader)', makeTeachingContent()));
      root.appendChild(makeSection(
        'Publications',
        makePublicationsContent(profile)
      ));
      root.appendChild(makeSection(profile.skillsLabel, makeSkillsContent(profile)));
      root.appendChild(makeSection('Professional Memberships & Certifications', makeMembershipsContent()));

    } else {
      // ── Industry layout ──
      root.appendChild(makeSection(profile.skillsLabel, makeSkillsContent(profile)));

      if(profile.teachingFirst){
        root.appendChild(makeSection('Teaching Portfolio  (★ = Module Leader)', makeTeachingContent()));
        root.appendChild(makeSection('Professional Experience', makeExperienceContent(profile)));
      } else {
        root.appendChild(makeSection('Professional Experience', makeExperienceContent(profile)));
        root.appendChild(makeSection('Education', makeEducationContent()));
      }

      const projContent = makeProjectsContent(profile);
      if(projContent) root.appendChild(makeSection('Selected Projects', projContent));

      if(!profile.teachingFirst){
        root.appendChild(makeSection('Teaching Portfolio  (★ = Module Leader)', makeTeachingContent()));
      }

      root.appendChild(makeSection(
        profile.allPubs ? 'Publications' : `Selected Publications  (${DATA.publications.journal.length + 2}+ peer-reviewed)`,
        makePublicationsContent(profile)
      ));
      root.appendChild(makeSection('Professional Memberships & Certifications', makeMembershipsContent()));
    }

    // Footer
    root.appendChild(el('div','cv-footer',
      'www.drtertseghaanande.com &nbsp;|&nbsp; tertseghaanande@gmail.com &nbsp;|&nbsp; github.com/Tertsegha1'
    ));

  } catch(err){
    console.error('CV render error:', err);
    root.innerHTML = `<p style="color:red;padding:1rem;">Render error: ${err.message} — check console for details.</p>`;
  }

  // Trigger fade-in animation regardless of success/failure
  requestAnimationFrame(()=> requestAnimationFrame(()=> root.classList.add('rendered')));
}

/* ═══════════════════════════════════════════════════════
   PROFILE TABS
═══════════════════════════════════════════════════════ */
function buildTabs(){
  const bar = document.getElementById('profTabs');
  Object.values(PROFILES).forEach(prof => {
    const btn = el('button','ptab');
    btn.innerHTML = `<span class="ptab-icon">${prof.icon}</span>${prof.label}`;
    btn.dataset.id = prof.id;
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderCV(prof.id);
    });
    if(prof.id === 'database') btn.classList.add('active');
    bar.appendChild(btn);
  });
}

/* ═══════════════════════════════════════════════════════
   DOCX DOWNLOAD (profile-aware)
═══════════════════════════════════════════════════════ */
async function downloadDocx(){
  const btn = document.getElementById('docxBtn');
  btn.textContent = 'Generating…'; btn.disabled = true;

  try {
    const {
      Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
      AlignmentType, LevelFormat, BorderStyle, WidthType,
      TabStopType, PageNumber, Header, ExternalHyperlink,
    } = docx;

    const NAVY='0F2044', NAVY2='1A3260', GOLD='E8A020', DGRAY='2C3E50', MGRAY='5A6A7E';
    const CW = 9890;
    const sp=(b,a)=>({spacing:{before:b,after:a}});
    const run=(t,o={})=>new TextRun({text:t,font:'Arial',...o});
    const bold=(t,o={})=>run(t,{bold:true,...o});

    function dsh(text){
      return new Paragraph({...sp(200,70),
        border:{bottom:{style:BorderStyle.SINGLE,size:12,color:GOLD,space:4}},
        children:[new TextRun({text:text.toUpperCase(),font:'Arial',size:19,bold:true,color:NAVY,characterSpacing:40})]});
    }
    function dstrip(s){ return (s||'').replace(/<[^>]+>/g,'').replace(/&amp;/g,'&').replace(/&gt;/g,'>'); }
    function djob(j){
      return [
        new Paragraph({...sp(120,0),tabStops:[{type:TabStopType.RIGHT,position:CW}],
          children:[bold(j.title,{size:20,color:NAVY}),run('\t',{size:20}),run(j.date,{size:18,color:MGRAY,italics:true})]}),
        new Paragraph({...sp(0,40),children:[run(j.org,{size:18,color:MGRAY,italics:true})]}),
        ...j.bullets.map(b=>new Paragraph({numbering:{reference:'bul',level:0},...sp(0,25),
          children:[run(dstrip(b),{size:18,color:DGRAY})]}))
      ];
    }
    function dchip(label,chips){
      return new Paragraph({...sp(25,25),
        children:[bold(label+': ',{size:18,color:NAVY}),run(chips.join('  ·  '),{size:18,color:DGRAY})]});
    }
    function dpub(p){
      return new Paragraph({...sp(50,0),
        children:[bold(p.authors+' ',{size:17}),run(p.title+'. ',{size:17,italics:true}),run(p.year+'.',{size:17})]});
    }

    const profile = PROFILES[currentProfileId];
    const p = DATA.personal;

    // Build skills paragraphs
    const allSkills = DATA.skills;
    const first = allSkills.filter(s => profile.skillsFirst.some(k => s.title.includes(k)));
    const also  = (profile.skillsAlso||[]).map(k=>allSkills.find(s=>s.title.includes(k))).filter(Boolean);
    const skillParas = [...first,...also].map(sk=>dchip(sk.title, sk.tags));

    // Build experience paragraphs
    let jobs = [...DATA.experience];
    if(profile.expReorder){
      jobs.sort((a,b)=>{
        const ai=profile.expReorder.findIndex(k=>a.title.includes(k));
        const bi=profile.expReorder.findIndex(k=>b.title.includes(k));
        return (ai===-1?99:ai)-(bi===-1?99:bi);
      });
    }
    const expParas = jobs.flatMap(j=>djob(j));

    // Build education
    const eduParas = DATA.education.flatMap(e=>[
      new Paragraph({...sp(80,0),children:[bold(e.degree,{size:20,color:NAVY})]}),
      new Paragraph({...sp(0,50),children:[run(e.institution,{size:18,color:MGRAY,italics:true})]})
    ]);

    // Build teaching table
    const teachTable = new Table({
      width:{size:CW,type:WidthType.DXA},
      columnWidths:[Math.floor(CW/2),Math.ceil(CW/2)],
      borders:{top:{style:BorderStyle.NONE},bottom:{style:BorderStyle.NONE},left:{style:BorderStyle.NONE},right:{style:BorderStyle.NONE},insideH:{style:BorderStyle.NONE},insideV:{style:BorderStyle.NONE}},
      rows:[new TableRow({children:[
        new TableCell({width:{size:Math.floor(CW/2),type:WidthType.DXA},margins:{top:40,bottom:40,left:0,right:120},
          children:[
            new Paragraph({...sp(0,40),children:[bold('Postgraduate (MSc / PGD)',{size:18,color:NAVY})]}),
            ...DATA.teaching.postgraduate.map(m=>new Paragraph({...sp(0,18),children:[run(m.leader?m.label+' ★':m.label,{size:17,bold:m.leader,color:m.leader?NAVY:DGRAY})]}))
          ]}),
        new TableCell({width:{size:Math.ceil(CW/2),type:WidthType.DXA},margins:{top:40,bottom:40,left:120,right:0},
          children:[
            new Paragraph({...sp(0,40),children:[bold('Undergraduate',{size:18,color:NAVY})]}),
            ...DATA.teaching.undergraduate.map(m=>{
              const isDb=m.label.toLowerCase().includes('database');
              return new Paragraph({...sp(0,18),children:[run(m.leader?m.label+' ★':m.label,{size:17,bold:m.leader||isDb,color:(m.leader||isDb)?NAVY:DGRAY})]});
            })
          ]})
      ]})]
    });

    // Build publications
    const pubParas = [];
    if(profile.allPubs){
      pubParas.push(new Paragraph({...sp(60,30),children:[bold('Journal Articles',{size:18,color:NAVY})]}));
      DATA.publications.journal.forEach(p=>pubParas.push(dpub(p)));
      pubParas.push(new Paragraph({...sp(60,30),children:[bold('Conference Papers',{size:18,color:NAVY})]}));
      DATA.publications.conference.forEach(p=>pubParas.push(dpub(p)));
      pubParas.push(new Paragraph({...sp(60,30),children:[bold('Book',{size:18,color:NAVY})]}));
      DATA.publications.book.forEach(p=>pubParas.push(dpub(p)));
      pubParas.push(new Paragraph({...sp(60,30),children:[bold('In Preparation',{size:18,color:NAVY})]}));
      DATA.publications.inPrep.forEach(p=>pubParas.push(dpub(p)));
    } else {
      DATA.publications.journal.slice(0,profile.pubCount||4).forEach(p=>pubParas.push(dpub(p)));
      DATA.publications.conference.forEach(p=>pubParas.push(dpub(p)));
    }
    pubParas.push(new Paragraph({...sp(30,0),children:[run('Full list: scholar.google.com/citations?user=J5pMcosAAAAJ',{size:16,color:MGRAY,italics:true})]}));

    // Build projects
    const projParas = [];
    if(profile.projectKeys && profile.projectKeys.length>0){
      projParas.push(dsh('Selected Projects'));
      DATA.projects.filter(p=>profile.projectKeys.some(k=>p.title.includes(k))).forEach(proj=>{
        projParas.push(new Paragraph({...sp(80,0),children:[bold(dstrip(proj.title),{size:19,color:NAVY})]}));
        projParas.push(new Paragraph({...sp(0,20),children:[run(proj.tech.slice(0,5).join(' · '),{size:16,color:GOLD})]}));
        projParas.push(new Paragraph({...sp(0,60),children:[run(dstrip(proj.desc).substring(0,220)+'…',{size:17,color:DGRAY})]}));
      });
    }

    // Build research interests (academic only)
    const riParas = [];
    if(profile.type==='academic'){
      riParas.push(dsh('Research Interests'));
      const riText = DATA.research.map(r=>r.title).join('  ·  ');
      riParas.push(new Paragraph({...sp(60,120),children:[run(riText,{size:18,color:DGRAY})]}));
    }

    // Assemble section order
    const allChildren = [
      // Name block
      new Paragraph({...sp(0,0),children:[new TextRun({text:p.name,font:'Arial',size:48,bold:true,color:NAVY})]}),
      new Paragraph({...sp(40,0),children:[run('PhD  ·  FHEA  ·  MBCS  ·  IET  ·  IEEE',{size:20,color:GOLD,bold:true})]}),
      new Paragraph({...sp(40,70),tabStops:[{type:TabStopType.LEFT,position:2000},{type:TabStopType.LEFT,position:4900},{type:TabStopType.LEFT,position:7600}],
        children:[run('Birmingham, UK',{size:18,color:MGRAY}),run('\t'),run(p.email,{size:18,color:MGRAY}),run('\t'),
          new ExternalHyperlink({link:'https://www.drtertseghaanande.com',children:[new TextRun({text:'drtertseghaanande.com',font:'Arial',size:18,color:NAVY2,underline:{}})]}),
          run('\t'),new ExternalHyperlink({link:p.linkedin,children:[new TextRun({text:'LinkedIn',font:'Arial',size:18,color:NAVY2,underline:{}})]})]}),
      new Paragraph({...sp(0,140),border:{bottom:{style:BorderStyle.SINGLE,size:18,color:NAVY,space:1}},children:[]}),

      // Profile label
      new Paragraph({...sp(0,50),children:[run(`${profile.icon}  ${profile.label} CV`,{size:17,color:MGRAY,italics:true})]}),

      // Summary
      new Paragraph({...sp(0,0),children:[run(profile.summary[0],{size:18,color:DGRAY})]}),
      new Paragraph({...sp(50,130),children:[run(profile.summary[1],{size:18,color:DGRAY})]}),
    ];

    if(profile.type==='academic'){
      allChildren.push(...riParas);
      allChildren.push(dsh('Education'),...eduParas,new Paragraph({...sp(120,0),children:[]}));
      allChildren.push(dsh('Academic Experience'),...expParas,new Paragraph({...sp(120,0),children:[]}));
      allChildren.push(dsh('Teaching Portfolio  (★ = Module Leader)'),teachTable,new Paragraph({...sp(120,0),children:[]}));
      allChildren.push(dsh(profile.allPubs?'Publications':`Selected Publications  (${DATA.publications.journal.length+2}+ peer-reviewed)`),...pubParas,new Paragraph({...sp(120,0),children:[]}));
      allChildren.push(dsh(profile.skillsLabel),...skillParas,new Paragraph({...sp(120,0),children:[]}));
    } else {
      allChildren.push(dsh(profile.skillsLabel),...skillParas,new Paragraph({...sp(120,0),children:[]}));
      if(profile.teachingFirst){
        allChildren.push(dsh('Teaching Portfolio  (★ = Module Leader)'),teachTable,new Paragraph({...sp(120,0),children:[]}));
        allChildren.push(dsh('Professional Experience'),...expParas,new Paragraph({...sp(120,0),children:[]}));
      } else {
        allChildren.push(dsh('Professional Experience'),...expParas,new Paragraph({...sp(120,0),children:[]}));
        allChildren.push(dsh('Education'),...eduParas,new Paragraph({...sp(120,0),children:[]}));
      }
      if(projParas.length) allChildren.push(...projParas,new Paragraph({...sp(120,0),children:[]}));
      if(!profile.teachingFirst){ allChildren.push(dsh('Teaching Portfolio  (★ = Module Leader)'),teachTable,new Paragraph({...sp(120,0),children:[]})); }
      allChildren.push(dsh(`Selected Publications`),...pubParas,new Paragraph({...sp(120,0),children:[]}));
    }

    allChildren.push(
      dsh('Professional Memberships & Certifications'),
      new Paragraph({...sp(50,30),children:[bold('Memberships: ',{size:18}),run('Fellow of the Higher Education Academy (FHEA, PR336175) · Member of the BCS (MBCS) · IET Member · IEEE & ComSoc · INSTICC',{size:18})]}),
      new Paragraph({...sp(0,0),children:[bold('Certifications: ',{size:18}),run('OCPP v1.6, v1.6 Advanced & v2.0+ (EV Charging) · Build Basic GANs — DeepLearning.AI / Coursera · Preparing to Teach in Higher Education · Project Management & Science Communication · Business, Innovation & Commercialisation (Warwick Doctoral College)',{size:18})]}),
      new Paragraph({...sp(140,0),border:{bottom:{style:BorderStyle.SINGLE,size:4,color:'E1E8F0',space:1}},children:[]}),
      new Paragraph({...sp(70,0),alignment:AlignmentType.CENTER,children:[run('www.drtertseghaanande.com   |   tertseghaanande@gmail.com   |   github.com/Tertsegha1',{size:16,color:MGRAY})]})
    );

    const doc2 = new Document({
      numbering:{config:[{reference:'bul',levels:[{level:0,format:LevelFormat.BULLET,text:'–',
        alignment:AlignmentType.LEFT,style:{paragraph:{indent:{left:300,hanging:180}},run:{font:'Arial',color:GOLD}}}]}]},
      styles:{default:{document:{run:{font:'Arial',size:19,color:DGRAY}}}},
      sections:[{
        properties:{page:{size:{width:11906,height:16838},margin:{top:720,right:1008,bottom:720,left:1008}}},
        headers:{default:new Header({children:[new Paragraph({...sp(0,0),
          border:{bottom:{style:BorderStyle.SINGLE,size:6,color:GOLD,space:2}},
          tabStops:[{type:TabStopType.RIGHT,position:CW}],
          children:[run(`Dr. Tertsegha Anande  —  ${profile.label} CV`,{size:16,color:MGRAY}),run('\t'),
            new TextRun({children:['Page ',PageNumber.CURRENT,' of ',PageNumber.TOTAL_PAGES],font:'Arial',size:16,color:MGRAY})]})]})} ,
        children: allChildren,
      }]
    });

    const blob = await Packer.toBlob(doc2);
    const filename = `CV_Tertsegha_Anande_${profile.label.replace(/[/ ]+/g,'_')}.docx`;
    saveAs(blob, filename);
    btn.textContent = '✓ Downloaded';
  } catch(err){
    console.error(err);
    btn.textContent = 'Error — see console';
  } finally {
    btn.disabled = false;
    setTimeout(()=>{ btn.textContent = '↓ Download DOCX'; }, 3000);
  }
}

/* ── Init ── */
buildTabs();
renderCV('database');
</script>
